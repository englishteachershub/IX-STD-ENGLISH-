/* =====================================================================
   STATE
   ===================================================================== */
let state = {
  studentName:"", schoolName:"", studentClass:"",
  unit:null, category:"", mode:"",
  questions:[], currentIndex:0,
  score:0, answers:[], locked:false
};

function show(id){
  ["screen-start","screen-units","screen-options","screen-quiz","screen-result"].forEach(s=>{
    document.getElementById(s).classList.add("hidden");
  });
  document.getElementById(id).classList.remove("hidden");
}

function goToUnitSelect(){
  const name = document.getElementById("studentName").value.trim();
  if(!name){ alert("Please enter your name to continue."); return; }
  state.studentName = name;
  state.schoolName = document.getElementById("schoolName").value.trim();
  state.studentClass = document.getElementById("studentClass").value.trim();
  const list = document.getElementById("unitList");
  list.innerHTML = "";
  UNITS.forEach(u=>{
    const btn = document.createElement("button");
    btn.className = "unit-btn";
    btn.textContent = u.title;
    btn.onclick = ()=>selectUnit(u);
    list.appendChild(btn);
  });
  show("screen-units");
}

function selectUnit(u){
  state.unit = u;
  document.getElementById("unitTitle").textContent = u.title;
  document.getElementById("startQuizWrap").classList.add("hidden");
  state.category = ""; state.mode = "";
  document.querySelectorAll("#screen-options .opt-btn").forEach(b=>b.classList.remove("selected"));
  show("screen-options");
}

function selectCategory(cat){
  state.category = cat;
  ["synonyms","antonyms","mixed"].forEach(c=>{
    document.getElementById("catBtn-"+c).classList.toggle("selected", c===cat);
  });
  checkReadyToStart();
}
function selectMode(mode){
  state.mode = mode;
  ["practice","test"].forEach(m=>{
    document.getElementById("modeBtn-"+m).classList.toggle("selected", m===mode);
  });
  checkReadyToStart();
}
function checkReadyToStart(){
  if(state.category && state.mode){
    document.getElementById("startQuizWrap").classList.remove("hidden");
  }
}

function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

function startQuiz(){
  let pool = [];
  if(state.category==="synonyms") pool = state.unit.synonyms.map(x=>({...x,cat:"Synonym"}));
  else if(state.category==="antonyms") pool = state.unit.antonyms.map(x=>({...x,cat:"Antonym"}));
  else pool = [
    ...state.unit.synonyms.map(x=>({...x,cat:"Synonym"})),
    ...state.unit.antonyms.map(x=>({...x,cat:"Antonym"}))
  ];
  state.questions = shuffle(pool);
  state.currentIndex = 0;
  state.score = 0;
  state.answers = [];
  document.getElementById("quizTag").textContent =
    state.unit.title + " - " + (state.category==="mixed"?"Mixed":state.category) + " - " + (state.mode==="practice"?"Practice":"Test");
  show("screen-quiz");
  renderQuestion();
}

function renderQuestion(){
  state.locked = false;
  const q = state.questions[state.currentIndex];
  const total = state.questions.length;
  document.getElementById("progressFill").style.width = ((state.currentIndex)/total*100)+"%";
  document.getElementById("qCounter").textContent = "Question "+(state.currentIndex+1)+" of "+total+" ("+q.cat+")";
  document.getElementById("qText").textContent = q.context.replace(/'([^']+)'/,"'$1'");
  const choicesDiv = document.getElementById("choices");
  choicesDiv.innerHTML = "";
  const letters = ["a","b","c","d"];
  q.options.forEach((opt,idx)=>{
    if(!opt) return;
    const btn = document.createElement("button");
    btn.className = "choice-btn";
    btn.textContent = letters[idx]+") "+opt;
    btn.onclick = ()=>selectChoice(idx,btn);
    choicesDiv.appendChild(btn);
  });
  document.getElementById("feedbackMsg").textContent = "";
  document.getElementById("nextBtn").classList.add("hidden");
}

function selectChoice(idx, btn){
  if(state.locked) return;
  state.locked = true;
  const q = state.questions[state.currentIndex];
  const correct = idx === q.a;
  if(correct) state.score++;
  state.answers.push({
    word:q.q, context:q.context, cat:q.cat,
    chosen: q.options[idx], correctAns: q.options[q.a], isCorrect: correct
  });

  const allBtns = document.querySelectorAll("#choices .choice-btn");
  if(state.mode==="practice"){
    allBtns.forEach((b,i)=>{
      if(i===q.a) b.classList.add("correct");
      if(i===idx && !correct) b.classList.add("wrong");
    });
    const fb = document.getElementById("feedbackMsg");
    fb.textContent = correct ? "Correct!" : ("Not quite. Correct answer: "+q.options[q.a]);
    fb.className = "feedback " + (correct?"correct-text":"wrong-text");
  } else {
    btn.classList.add("selected");
  }
  document.getElementById("nextBtn").classList.remove("hidden");
}

function nextQuestion(){
  state.currentIndex++;
  if(state.currentIndex >= state.questions.length){
    finishQuiz();
  } else {
    renderQuestion();
  }
}

function finishQuiz(){
  document.getElementById("progressFill").style.width = "100%";
  const total = state.questions.length;
  const pct = Math.round((state.score/total)*100);
  document.getElementById("scoreBig").textContent = state.score + " / " + total;
  document.getElementById("scorePct").textContent = pct + "%";

  const reviewList = document.getElementById("reviewList");
  reviewList.innerHTML = "<h2>Review</h2>";
  state.answers.forEach((a,i)=>{
    const div = document.createElement("div");
    div.className = "review-item " + (a.isCorrect?"ok":"wrong");
    div.textContent = (i+1)+". ["+a.cat+"] "+a.word+" -> Your answer: "+a.chosen+
      (a.isCorrect ? " (Correct)" : (" (Correct answer: "+a.correctAns+")"));
    reviewList.appendChild(div);
  });

  show("screen-result");

  const congrats = document.getElementById("congratsMsg");
  congrats.className = "congrats-msg";
  if(pct >= 90){
    congrats.textContent = "🌟 Outstanding! 👏👏👏";
    congrats.style.color = "#1e7e34";
  } else if(pct >= 75){
    congrats.textContent = "🎉 Excellent Work! 👏👏";
    congrats.style.color = "#2e8b57";
  } else if(pct >= 60){
    congrats.textContent = "👍 Good Job! 👏";
    congrats.style.color = "#C9A227";
  } else if(pct >= 40){
    congrats.textContent = "💪 Keep Practicing!";
    congrats.style.color = "#c87814";
  } else {
    congrats.textContent = "📚 Try Again - You Can Do It!";
    congrats.style.color = "#b91c1c";
  }

  if(pct >= 60 && typeof confetti === "function"){
    const burst = pct >= 90 ? 220 : (pct >= 75 ? 180 : 150);
    confetti({particleCount:burst, spread:90, origin:{y:0.5}});
    setTimeout(()=>confetti({particleCount:120, spread:110, origin:{y:0.65}}), 350);
    if(pct >= 90){
      setTimeout(()=>confetti({particleCount:150, spread:120, origin:{y:0.4}, colors:["#C9A227","#1B2A4A","#ffffff"]}), 700);
    }
  }

  submitToGoogleForm(pct); // inactive unless GOOGLE_FORM.formId is configured; Cognito is the active option via the button below
}

function submitToGoogleForm(pct){
  if(GOOGLE_FORM.formId === "YOUR_FORM_ID_HERE") return; // not configured yet
  const url = "https://docs.google.com/forms/d/e/"+GOOGLE_FORM.formId+"/formResponse";
  const params = new URLSearchParams();
  params.append(GOOGLE_FORM.entries.name, state.studentName);
  params.append(GOOGLE_FORM.entries.className, state.studentClass);
  params.append(GOOGLE_FORM.entries.unit, state.unit.title);
  params.append(GOOGLE_FORM.entries.category, state.category);
  params.append(GOOGLE_FORM.entries.mode, state.mode);
  params.append(GOOGLE_FORM.entries.score, state.score);
  params.append(GOOGLE_FORM.entries.total, state.questions.length);
  params.append(GOOGLE_FORM.entries.percentage, pct+"%");
  params.append(GOOGLE_FORM.entries.date, new Date().toLocaleString());

  fetch(url, { method:"POST", mode:"no-cors", body:params })
    .catch(()=>{ /* no-cors always "fails" silently to read, that's expected */ });
}

function submitToCognito(){
  const total = state.questions.length;
  const pct = Math.round((state.score/total)*100);
  const nameParts = state.studentName.trim().split(/\s+/);
  const first = nameParts[0] || "";
  const last = nameParts.slice(1).join(" ") || "";
  const entry = {
    StudentName: { First: first, Last: last },
    SchoolName: state.schoolName || "-",
    ClassSection: state.studentClass || "-",
    Unit: state.unit.title,
    Category: state.category,
    Mode: state.mode,
    Score: state.score,
    Total: total,
    Percentage: pct+"%",
    Date: new Date().toLocaleString()
  };
  const url = COGNITO_FORM_URL + "?entry=" + encodeURIComponent(JSON.stringify(entry));
  window.open(url, "_blank");
}

function restartQuiz(){
  show("screen-units");
}

/* =====================================================================
   PDF REPORT (ASCII only - jsPDF WinAnsi constraint)
   ===================================================================== */
function toAscii(str){
  return str.replace(/[^\x00-\x7F]/g, "");
}

function getGrade(pct){
  if(pct>=90) return {label:"Outstanding", color:[30,126,52]};
  if(pct>=75) return {label:"Excellent", color:[46,139,87]};
  if(pct>=60) return {label:"Good", color:[201,162,39]};
  if(pct>=40) return {label:"Fair", color:[200,120,20]};
  return {label:"Needs Practice", color:[185,28,28]};
}

function downloadReport(){
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit:"mm", format:"a4" });
  const total = state.questions.length;
  const pct = Math.round((state.score/total)*100);
  const grade = getGrade(pct);
  const pageW = 210;

  /* Header band */
  doc.setFillColor(27,42,74);
  doc.rect(0,0,pageW,20,"F");
  doc.setFillColor(201,162,39);
  doc.rect(0,20,pageW,1.5,"F");
  doc.setTextColor(255,255,255);
  doc.setFontSize(15);
  doc.setFont(undefined,"bold");
  doc.text("IX Std Synonyms & Antonyms - Detailed Report", pageW/2, 12, {align:"center"});
  doc.setFont(undefined,"normal");

  /* Student info table (2-column, compact) */
  doc.autoTable({
    startY: 26,
    theme: "grid",
    styles:{ fontSize:9, cellPadding:2, textColor:[30,30,30], lineColor:[220,220,220] },
    headStyles:{ fillColor:[255,255,255] },
    body:[
      ["Student Name", toAscii(state.studentName), "School", toAscii(state.schoolName||"-")],
      ["Class/Section", toAscii(state.studentClass||"-"), "Unit", toAscii(state.unit.title)],
      ["Category", toAscii(state.category), "Mode", toAscii(state.mode)],
      ["Date", new Date().toLocaleDateString(), "Time", new Date().toLocaleTimeString()]
    ],
    columnStyles:{
      0:{fontStyle:"bold", textColor:[27,42,74], cellWidth:28},
      1:{cellWidth:65},
      2:{fontStyle:"bold", textColor:[27,42,74], cellWidth:25},
      3:{cellWidth:"auto"}
    },
    margin:{left:14, right:14}
  });

  /* Score summary strip */
  let y = doc.lastAutoTable.finalY + 5;
  doc.setFillColor(grade.color[0],grade.color[1],grade.color[2]);
  doc.roundedRect(14, y, pageW-28, 16, 2, 2, "F");
  doc.setTextColor(255,255,255);
  doc.setFontSize(13);
  doc.setFont(undefined,"bold");
  doc.text("Score: " + state.score + " / " + total + "   (" + pct + "%)   -   " + grade.label, pageW/2, y+10, {align:"center"});
  doc.setFont(undefined,"normal");
  y += 22;

  /* Question-wise table */
  const rows = state.answers.map((a,i)=>[
    i+1,
    toAscii(a.cat),
    toAscii(a.word),
    toAscii(a.chosen),
    a.isCorrect ? "-" : toAscii(a.correctAns),
    a.isCorrect ? "Correct" : "Wrong"
  ]);

  doc.autoTable({
    startY: y,
    head:[["#","Type","Word","Your Answer","Correct Answer","Result"]],
    body: rows,
    theme:"striped",
    styles:{ fontSize:8, cellPadding:1.8, textColor:[30,30,30] },
    headStyles:{ fillColor:[27,42,74], textColor:[255,255,255], fontStyle:"bold" },
    alternateRowStyles:{ fillColor:[245,243,238] },
    columnStyles:{
      0:{cellWidth:8, halign:"center"},
      1:{cellWidth:18},
      2:{cellWidth:30},
      3:{cellWidth:45},
      4:{cellWidth:45},
      5:{cellWidth:20, halign:"center", fontStyle:"bold"}
    },
    margin:{left:14, right:14},
    didParseCell: function(data){
      if(data.section === "body" && data.column.index === 5){
        if(data.cell.raw === "Correct"){ data.cell.styles.textColor = [30,126,52]; }
        else if(data.cell.raw === "Wrong"){ data.cell.styles.textColor = [185,28,28]; }
      }
    }
  });

  /* Footer credit - keep on same page */
  const finalY = doc.lastAutoTable.finalY + 8;
  doc.setDrawColor(201,162,39);
  doc.setLineWidth(0.3);
  doc.line(14, finalY, pageW-14, finalY);
  doc.setFontSize(8.5);
  doc.setTextColor(100,100,100);
  doc.text("T.S. Ramachandran, ELT, GHSS Erasakkanayakanur, Theni District  |  English Teachers Hub Theni", pageW/2, finalY+5, {align:"center"});

  doc.save(toAscii(state.studentName).replace(/\s+/g,"_") + "_" + toAscii(state.unit.title).replace(/\s+/g,"_") + "_Report.pdf");
}
